<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Study Squad — Live Classes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #fff; min-height: 100vh; }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(ellipse at 20% 30%, #0f0f1a, #03050a);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            animation: rotate 25s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(15,20,35,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo-futuristic { text-align: center; margin-bottom: 32px; }
        .logo-futuristic h1 {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-futuristic p { color: #94a3b8; font-size: 14px; margin-top: 8px; }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; color: #cbd5e1; margin-bottom: 8px; }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(10,14,30,0.8);
            border: 1.5px solid rgba(99,102,241,0.3);
            border-radius: 20px;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(99,102,241,0.4); }
        .btn:disabled { opacity: 0.6; transform: none; }
        .otp-group { display: flex; gap: 12px; justify-content: center; margin: 24px 0 20px; }
        .otp-input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: rgba(10,14,30,0.8);
            border: 1.5px solid rgba(99,102,241,0.3);
            border-radius: 16px;
            color: #fff;
            font-family: monospace;
        }
        .otp-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }
        .timer-text { text-align: center; margin: 16px 0; font-size: 13px; color: #94a3b8; }
        .message { margin-top: 20px; font-size: 13px; text-align: center; padding: 10px; border-radius: 12px; }
        .message.error { background: rgba(239,68,68,0.15); color: #f87171; }
        .message.success { background: rgba(74,222,128,0.15); color: #4ade80; }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #0a0e1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(99,102,241,0.2);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-name { font-size: 14px; font-weight: 500; color: #cbd5e1; }
        .logout-btn {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #f87171;
            cursor: pointer;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.3); }

        .landing-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .hero p { font-size: 18px; color: #94a3b8; }
        .batches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }
        .batch-card {
            background: rgba(20,25,45,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .batch-card:hover { transform: translateY(-5px); border-color: rgba(99,102,241,0.5); box-shadow: 0 20px 30px -15px rgba(0,0,0,0.5); }
        .batch-img { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(135deg, #1e293b, #0f172a); }
        .batch-info { padding: 20px; }
        .batch-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .batch-desc { font-size: 13px; color: #94a3b8; margin-bottom: 16px; }
        .batch-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            width: 100%;
        }

        .course-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .back-btn {
            background: rgba(99,102,241,0.2);
            border: 1px solid rgba(99,102,241,0.3);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            color: #cbd5e1;
            cursor: pointer;
            margin-bottom: 24px;
            display: inline-block;
        }
        .course-title { font-size: 32px; font-weight: 700; margin-bottom: 24px; }
        .course-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(99,102,241,0.2);
            margin-bottom: 24px;
        }
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            font-size: 15px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active { color: #6366f1; border-bottom: 2px solid #6366f1; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        
        .folders-list, .files-list { display: flex; flex-direction: column; gap: 12px; }
        .folder-item, .file-item {
            background: rgba(20,25,45,0.6);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .folder-item:hover, .file-item:hover { border-color: rgba(99,102,241,0.5); background: rgba(30,35,55,0.6); }
        .folder-icon, .file-icon { font-size: 28px; }
        .item-info { flex: 1; }
        .item-title { font-weight: 600; margin-bottom: 4px; }
        .item-meta { font-size: 12px; color: #94a3b8; }
        
        .live-card {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .live-card:hover { background: rgba(239,68,68,0.25); }
        .live-dot {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
        .live-title { flex: 1; margin-left: 12px; font-weight: 500; }
        .join-btn {
            background: #ef4444;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
        }
        .upcoming-card {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .upcoming-title { font-weight: 500; margin-bottom: 4px; }
        .upcoming-time { font-size: 12px; color: #94a3b8; }
        
        .sec-title { font-size: 18px; font-weight: 600; margin: 20px 0 16px; }
        .sec-title:first-child { margin-top: 0; }

        .player-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }
        .player-modal.active { display: flex; }
        .player-header {
            padding: 16px 20px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-player { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .video-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; max-height: 70vh; }
        .player-controls {
            padding: 16px;
            background: #111;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .player-controls select { background: #222; border: 1px solid #333; padding: 8px 16px; border-radius: 8px; color: #fff; }
        .chat-container {
            background: #1a1a2e;
            height: 300px;
            display: flex;
            flex-direction: column;
        }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid #2d2d44; font-weight: 600; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .chat-message {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 70%;
            word-break: break-word;
        }
        .chat-message.mine { background: #6366f1; align-self: flex-end; }
        .chat-message.other { background: #2d2d44; align-self: flex-start; }
        .chat-username { font-size: 10px; opacity: 0.7; margin-bottom: 2px; }
        .chat-text { font-size: 13px; }
        .chat-time { font-size: 9px; opacity: 0.5; margin-top: 2px; text-align: right; }
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid #2d2d44;
        }
        .chat-input-area input { flex: 1; background: #2d2d44; border: none; padding: 10px 16px; border-radius: 24px; color: #fff; }
        .chat-input-area button { background: #6366f1; border: none; padding: 10px 20px; border-radius: 24px; color: #fff; cursor: pointer; }
        .breadcrumb {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
        .breadcrumb span { cursor: pointer; }
        .breadcrumb span:hover { color: #6366f1; }
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .course-detail-card {
            background: rgba(20,25,45,0.6);
            border-radius: 20px;
            padding: 24px;
        }
        .course-detail-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .course-detail-desc { font-size: 16px; line-height: 1.6; color: #cbd5e1; }
        .price-box {
            margin-top: 20px;
            padding: 16px;
            background: rgba(99,102,241,0.1);
            border-radius: 12px;
        }
        .price-offer { font-size: 20px; font-weight: 700; color: #6366f1; }
        .price-mrp { text-decoration: line-through; color: #94a3b8; margin-left: 10px; }
        .price-disc { margin-left: 10px; color: #4ade80; }
        .package-card {
            background: rgba(20,25,45,0.4);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .package-card:hover { border-color: rgba(99,102,241,0.5); background: rgba(30,35,55,0.6); transform: translateY(-2px); }
        .package-img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
        .package-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .package-desc { font-size: 12px; color: #94a3b8; }
        .packages-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
    <div class="login-card">
        <div class="logo-futuristic">
            <h1>Study Squad</h1>
            <p>Enter the future of learning</p>
        </div>
        <div id="mobileStep">
            <div class="input-group">
                <label>📱 Mobile Number</label>
                <input type="tel" id="mobileInput" placeholder="9876543210" maxlength="10">
            </div>
            <button class="btn" id="sendOtpBtn">Send OTP →</button>
        </div>
        <div id="otpStep" style="display: none;">
            <div class="input-group">
                <label>🔐 Enter OTP</label>
                <div class="otp-group">
                    <input type="text" class="otp-input" maxlength="1" id="otp1">
                    <input type="text" class="otp-input" maxlength="1" id="otp2">
                    <input type="text" class="otp-input" maxlength="1" id="otp3">
                    <input type="text" class="otp-input" maxlength="1" id="otp4">
                    <input type="text" class="otp-input" maxlength="1" id="otp5">
                    <input type="text" class="otp-input" maxlength="1" id="otp6">
                </div>
            </div>
            <button class="btn" id="verifyOtpBtn">Verify & Continue →</button>
            <div id="timerText" class="timer-text"></div>
        </div>
        <div id="messageDiv" class="message"></div>
    </div>
</div>

<!-- LOADING ANIMATION -->
<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
    <div class="loading-text">Study Squad</div>
</div>

<!-- LANDING PAGE -->
<div id="landingPage" style="display: none;">
    <div class="header">
        <div class="logo">Study Squad</div>
        <div class="user-info">
            <span class="user-name" id="userName">Student</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>
    <div class="landing-container">
        <div class="hero">
            <h1>Welcome to Study Squad</h1>
            <p>Your journey to excellence starts here</p>
        </div>
        <div id="batchesGrid" class="batches-grid">
            <div class="empty-state">Loading courses...</div>
        </div>
    </div>
</div>

<!-- COURSE PAGE -->
<div id="coursePage" style="display: none;">
    <div class="header">
        <div class="logo">Study Squad</div>
        <div class="user-info">
            <span class="user-name" id="courseUserName">Student</span>
            <button class="logout-btn" id="courseLogoutBtn">Logout</button>
        </div>
    </div>
    <div class="course-container">
        <button class="back-btn" id="backToLanding">← Back to Batches</button>
        <h1 class="course-title" id="courseTitle">Loading...</h1>
        <div class="course-tabs">
            <button class="tab active" data-tab="overview">Overview</button>
            <button class="tab" data-tab="content">Content</button>
            <button class="tab" data-tab="live">Live</button>
        </div>
        <div id="overviewPane" class="tab-pane active">
            <div id="overviewContent" class="empty-state">Loading overview...</div>
        </div>
        <div id="contentPane" class="tab-pane">
            <div id="breadcrumb" class="breadcrumb"></div>
            <div id="contentArea" class="empty-state">Loading content...</div>
        </div>
        <div id="livePane" class="tab-pane">
            <div id="liveArea" class="empty-state">Loading live classes...</div>
        </div>
    </div>
</div>

<!-- PLAYER MODAL -->
<div id="playerModal" class="player-modal">
    <div class="player-header">
        <span id="playerTitle">Live Class</span>
        <button class="close-player" id="closePlayerBtn">✕</button>
    </div>
    <div class="video-container">
        <video id="videoPlayer" controls></video>
    </div>
    <div class="player-controls">
        <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
        </select>
        <select id="qualitySelect">
            <option value="auto">Auto Quality</option>
        </select>
    </div>
    <div id="chatContainer" class="chat-container" style="display: none;">
        <div class="chat-header">💬 Live Discussion</div>
        <div id="chatMessages" class="chat-messages"></div>
        <div id="chatInputArea" class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ask a doubt...">
            <button id="sendChatBtn">Send</button>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIG ====================
    const PROXY = "https://proxy-test-three.vercel.app/api/proxy";
    const BATCHES_API = "https://proxy-test-three.vercel.app/api/batches";
    
    // ==================== GLOBAL STATE ====================
    let authToken = localStorage.getItem("accessToken");
    let currentCourseId = null;
    let currentFolderId = null;
    let folderStack = [];
    let currentHls = null;
    let currentMqttClient = null;
    let bufferInterval = null;

    // Helper function to escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ==================== TOKEN ====================
    function saveToken(token, refreshToken, expiresIn) {
        authToken = token;
        localStorage.setItem("accessToken", token);
        if (refreshToken) localStorage.setItem("refreshToken", refreshToken);
        if (expiresIn) localStorage.setItem("tokenExpiry", expiresIn);
    }
    function clearToken() { authToken = null; localStorage.clear(); }
    function isTokenExpired() {
        let expiry = localStorage.getItem("tokenExpiry");
        if (!expiry) return true;
        return Date.now() >= (parseInt(expiry) - 5 * 60 * 1000);
    }

    // ==================== API ====================
    async function apiCall(action, params = {}, method = "GET", body = null) {
        let url = `${PROXY}?action=${action}`;
        if (method === "GET" && Object.keys(params).length) url += "&" + new URLSearchParams(params).toString();
        let options = { method, headers: { "Content-Type": "application/json" } };
        if (authToken) options.headers["Authorization"] = `Bearer ${authToken}`;
        if (method === "POST" && body) options.body = JSON.stringify(body);
        let res = await fetch(url, options);
        let data = await res.json();
        if (res.status === 401 && !isTokenExpired()) { clearToken(); showLogin(); throw new Error("Session expired"); }
        return data;
    }

    // ==================== LOGIN ====================
    let currentMobile = "", otpTimer = null;
    
    document.getElementById("sendOtpBtn").onclick = async () => {
        let mobile = document.getElementById("mobileInput").value.trim();
        if (mobile.length !== 10 || !/^[6-9]\d{9}$/.test(mobile)) {
            showMessage("Enter valid 10-digit mobile number", "error");
            return;
        }
        currentMobile = mobile;
        let btn = document.getElementById("sendOtpBtn");
        btn.disabled = true; btn.innerText = "Sending...";
        try {
            let data = await apiCall("sendotp", {}, "POST", { mobile: mobile });
            if (data.success) {
                showMessage("✅ OTP sent! Check your mobile", "success");
                document.getElementById("mobileStep").style.display = "none";
                document.getElementById("otpStep").style.display = "block";
                setupOtpInputs();
                startTimer(60);
                ["otp1","otp2","otp3","otp4","otp5","otp6"].forEach(id => document.getElementById(id).value = "");
                document.getElementById("otp1").focus();
            } else { showMessage(data.message || "Failed to send OTP", "error"); }
        } catch(e) { showMessage("Network error", "error"); }
        btn.disabled = false; btn.innerText = "Send OTP →";
    };

    function setupOtpInputs() {
        let inputs = ["otp1","otp2","otp3","otp4","otp5","otp6"];
        inputs.forEach((id, i) => {
            let inp = document.getElementById(id);
            inp.oninput = () => {
                if (inp.value.length === 1 && i < 5) document.getElementById(inputs[i+1]).focus();
                if (getOtp().length === 6) verifyOTP();
            };
            inp.onkeydown = (e) => {
                if (e.key === "Backspace" && !inp.value && i > 0) document.getElementById(inputs[i-1]).focus();
            };
        });
    }
    
    function getOtp() {
        return ["otp1","otp2","otp3","otp4","otp5","otp6"].map(id => document.getElementById(id).value).join("");
    }
    
    function startTimer(seconds) {
        let remaining = seconds;
        let timerDiv = document.getElementById("timerText");
        if (otpTimer) clearInterval(otpTimer);
        timerDiv.innerText = `Resend in ${remaining}s`;
        otpTimer = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                clearInterval(otpTimer);
                timerDiv.innerText = "";
                document.getElementById("sendOtpBtn").disabled = false;
            } else {
                timerDiv.innerText = `Resend in ${remaining}s`;
                document.getElementById("sendOtpBtn").disabled = true;
            }
        }, 1000);
    }
    
    async function verifyOTP() {
        let otp = getOtp();
        if (otp.length !== 6) { showMessage("Enter full 6-digit OTP", "error"); return; }
        let btn = document.getElementById("verifyOtpBtn");
        btn.disabled = true; btn.innerText = "Verifying...";
        try {
            let data = await apiCall("verifyotp", {}, "POST", { mobile: currentMobile, otp: otp });
            let token = data.accessToken || data.data?.accessToken;
            if (token) {
                saveToken(token, data.refreshToken, data.expiresIn);
                showMessage("✅ Login successful! Redirecting...", "success");
                document.getElementById("loadingOverlay").style.display = "flex";
                setTimeout(async () => {
                    await loadProfileAndLanding();
                    document.getElementById("loadingOverlay").style.display = "none";
                    showLanding();
                }, 1500);
            } else {
                showMessage(data.message || "Invalid OTP", "error");
                btn.disabled = false;
                btn.innerText = "Verify & Continue →";
            }
        } catch(e) {
            showMessage("Error: " + e.message, "error");
            btn.disabled = false;
            btn.innerText = "Verify & Continue →";
        }
    }

    // ==================== MQTT CHAT WITH NAMES (FIXED) ====================
    function initMQTTChat(videoData) {
        let cred = videoData.mqtt_live_cred;
        let publicNode = cred.public_chat_node || videoData.chat_node;
        
        if (!publicNode) {
            console.log("No public chat node found");
            return;
        }
        
        document.getElementById("chatContainer").style.display = "flex";
        let chatMessages = document.getElementById("chatMessages");
        chatMessages.innerHTML = '<div class="chat-message system">Connecting to chat...</div>';
        
        let userId = localStorage.getItem("userId") || "user";
        let userName = localStorage.getItem("userName") || document.getElementById("userName")?.innerText || "Student";
        let baseUrl = cred.mqtt_chat_url || cred.websocket_chat_url || "mqtt-ws.nexttoppers.com";
        
        // Use port 8084
        const port = 8084;
        const wsUrl = `wss://${baseUrl}:${port}/mqtt`;
        
        console.log(`🔄 Connecting to MQTT: ${wsUrl}`);
        chatMessages.innerHTML = `<div class="chat-message system">Connecting via port ${port}...</div>`;
        
        try {
            const client = mqtt.connect(wsUrl, {
                username: userId,
                password: authToken,
                clientId: `studysquad_${userId}_${Date.now()}`,
                protocol: 'wss',
                clean: true,
                reconnectPeriod: 5000,
                connectTimeout: 10000,
                rejectUnauthorized: false
            });
            
            client.on("connect", () => {
                console.log(`✅ MQTT Connected successfully on port ${port}!`);
                chatMessages.innerHTML = '<div class="chat-message system">✅ Connected to live chat!</div>';
                client.subscribe(publicNode, (err) => {
                    if (!err) console.log(`Subscribed to: ${publicNode}`);
                    else console.log("Subscribe error:", err);
                });
                
                // Send join message with name
                client.publish(publicNode, JSON.stringify({
                    user_id: userId,
                    name: userName,
                    message: "joined the class",
                    type: "system",
                    timestamp: Date.now()
                }));
            });
            
            client.on("message", (topic, message) => {
                try {
                    let msg = message.toString();
                    let parsed;
                    try {
                        parsed = JSON.parse(msg);
                    } catch(e) {
                        parsed = { message: msg, user_id: "other" };
                    }
                    
                    // Debug: Log the full message to see what fields are available
                    console.log("📨 MQTT Message received:", parsed);
                    
                    // Extract sender name from various possible fields
                    let senderName = 
                        parsed.name ||
                        parsed.user_name ||
                        parsed.username ||
                        parsed.sender_name ||
                        parsed.display_name ||
                        parsed.nickname ||
                        (parsed.user_id === userId ? "You" : null) ||
                        parsed.user_id ||
                        "Anonymous";
                    
                    // Check if message is from current user
                    let isMine = parsed.user_id === userId;
                    
                    let chatDiv = document.getElementById("chatMessages");
                    let msgEl = document.createElement("div");
                    msgEl.className = `chat-message ${isMine ? "mine" : "other"}`;
                    
                    // Format message with name and content
                    msgEl.innerHTML = `
                        <div class="chat-username">${escapeHtml(senderName)}</div>
                        <div class="chat-text">${escapeHtml(parsed.message || parsed.text || msg)}</div>
                        <div class="chat-time">${new Date(parsed.timestamp || Date.now()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    `;
                    
                    chatDiv.appendChild(msgEl);
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                    
                    // Keep only last 100 messages
                    while (chatDiv.children.length > 100) {
                        chatDiv.removeChild(chatDiv.firstChild);
                    }
                } catch(e) {
                    console.log("Message parse error:", e);
                }
            });
            
            client.on("error", (err) => {
                console.error("MQTT Error:", err);
                chatMessages.innerHTML = '<div class="chat-message system error">❌ Chat connection failed. Please refresh.</div>';
            });
            
            client.on("offline", () => {
                console.log("MQTT Offline");
            });
            
            client.on("reconnect", () => {
                console.log("MQTT Reconnecting...");
            });
            
            currentMqttClient = client;
            
        } catch(e) {
            console.error("MQTT Init Error:", e);
            chatMessages.innerHTML = '<div class="chat-message system error">❌ Failed to connect to chat.</div>';
        }
        
        // Send message handler with name
        document.getElementById("sendChatBtn").onclick = () => {
            let input = document.getElementById("chatInput");
            let text = input.value.trim();
            if (text && currentMqttClient && currentMqttClient.connected) {
                let userName = localStorage.getItem("userName") || document.getElementById("userName")?.innerText || "Student";
                let userId = localStorage.getItem("userId") || "user";
                
                let messageData = {
                    user_id: userId,
                    name: userName,
                    message: text,
                    type: "chat",
                    timestamp: Date.now()
                };
                
                console.log("📤 Sending message:", messageData);
                currentMqttClient.publish(publicNode, JSON.stringify(messageData));
                input.value = "";
            } else if (!currentMqttClient?.connected) {
                alert("Chat not connected. Please refresh and try again.");
            }
        };
    }

    // ==================== VIDEO PLAYER ====================
    async function openVideo(contentId, title) {
        showPlayer();
        document.getElementById("playerTitle").innerText = title || "Video";
        document.getElementById("chatContainer").style.display = "none";
        
        // Clean up previous
        if (currentHls) { currentHls.destroy(); currentHls = null; }
        if (currentMqttClient) { currentMqttClient.end(); currentMqttClient = null; }
        if (bufferInterval) { clearInterval(bufferInterval); bufferInterval = null; }
        
        let video = document.getElementById("videoPlayer");
        video.pause();
        video.src = "";
        video.load();
        
        try {
            let data = await apiCall("video", { content_id: contentId, course_id: currentCourseId });
            console.log("Video Details:", data);
            
            let videoData = data.data || {};
            let streamUrl = videoData.file_url || videoData.directUrl;
            let liveStatus = videoData.live_status;
            
            if (!streamUrl) {
                alert("Stream URL not available");
                closePlayer();
                return;
            }
            
            // Initialize HLS player
            if (Hls.isSupported() && (streamUrl.includes(".m3u8") || streamUrl.includes("m3u8"))) {
                let hls = new Hls({ 
                    maxBufferLength: 30, 
                    enableWorker: true,
                    manifestLoadingTimeOut: 10000,
                    levelLoadingTimeOut: 10000,
                    fragLoadingTimeOut: 20000
                });
                currentHls = hls;
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, (event, levelData) => {
                    video.play().catch(e => console.log("Autoplay prevented:", e));
                    
                    let qualitySelect = document.getElementById("qualitySelect");
                    if (levelData.levels && levelData.levels.length > 1) {
                        qualitySelect.innerHTML = '<option value="auto">Auto Quality</option>';
                        levelData.levels.forEach((level, i) => {
                            if (level.height) {
                                let opt = document.createElement("option");
                                opt.value = i;
                                opt.textContent = level.height + "p";
                                qualitySelect.appendChild(opt);
                            }
                        });
                        qualitySelect.onchange = () => {
                            hls.currentLevel = qualitySelect.value === "auto" ? -1 : parseInt(qualitySelect.value);
                        };
                    }
                });
                
                hls.on(Hls.Events.ERROR, (event, err) => { 
                    console.error("HLS Error:", err);
                    if (err.fatal) {
                        hls.recoverMediaError();
                    }
                });
                
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = streamUrl;
            } else {
                video.src = streamUrl;
            }
            
            // Speed selector
            document.getElementById("speedSelect").onchange = () => {
                video.playbackRate = parseFloat(document.getElementById("speedSelect").value);
            };
            
            // MQTT Chat for live class (live_status === 1)
            if (videoData.mqtt_live_cred && liveStatus === 1) {
                console.log("✅ MQTT Credentials found, initializing chat...");
                initMQTTChat(videoData);
            } else {
                console.log("Chat not available for this stream (live_status:", liveStatus, ")");
                document.getElementById("chatContainer").style.display = "flex";
                let chatMessages = document.getElementById("chatMessages");
                chatMessages.innerHTML = '<div class="chat-message system">💬 Chat is only available during live classes</div>';
                document.getElementById("chatInputArea").style.display = "none";
            }
            
        } catch(e) {
            console.error("Video error:", e);
            alert("Error loading video: " + e.message);
            closePlayer();
        }
    }

    document.getElementById("courseLogoutBtn").onclick = () => { clearToken(); showLogin(); };
    document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => switchTab(tab.dataset.tab)));

    // ==================== INIT ====================
    if (authToken && !isTokenExpired()) {
        document.getElementById("loadingOverlay").style.display = "flex";
        loadProfileAndLanding().then(() => {
            document.getElementById("loadingOverlay").style.display = "none";
            showLanding();
        });
    } else { showLogin(); }
</script>
</body>
</html>
